<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cecilia Lam</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #B31B1B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px;
    }
    h1 {
      font-size: clamp(72px, 15vw, 120px);
      font-weight: 700;
      line-height: 0.93;
      letter-spacing: -0.04em;
      color: #fff;
    }
    .period { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    p {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div>
    <h1>hello<span class="period">.</span></h1>
    <p>come back later</p>
  </div>
</body>
</html>
